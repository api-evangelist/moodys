        type: Documentation
    description: >-
      Bring together real-time news sources, and the best of the business web and social media to empower decision
      makers. The NewsEdge API provides access to Moody's 24,000+ news sources for integration into custom applications.
  - aid: moodys:quiqspread-api
    name: Moody's QUIQSpread API
    tags:
      - Automation
      - Banking
      - Financial Spreading
      - Financial Statements
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://hub.moodysanalytics.com
    contact:
