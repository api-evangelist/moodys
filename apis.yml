  - aid: moodys:autocycle-api
    name: Moody's AutoCycle API
    tags:
      - Automotive
      - Forecasts
      - Residual Value
      - Vehicle Pricing
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://api.economy.com
    contact:
      - FN: API Evangelist
        email: kin@apievangelist.com
