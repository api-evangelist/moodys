        type: Documentation
    description: >-
      The Risk Modeler API enables you to manage end-to-end catastrophe modeling workflows using Moody's RMS models for
      portfolios, accounts, and locations on the Intelligent Risk Platform.
  - aid: moodys:intelligent-risk-platform-api
    name: Moody's Intelligent Risk Platform API
    tags:
      - Insurance
      - Platform
      - Reinsurance
      - Risk Management
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://developer.rms.com
    contact:
      - FN: API Evangelist
        email: kin@apievangelist.com
    humanURL: https://developer.rms.com/platform/docs/introduction
    properties:
      - url: https://developer.rms.com/platform/docs/introduction
        type: Documentation
    description: >-
      Moody's RMS Platform APIs are a collection of REST APIs that enable Intelligent Risk Platform tenants to work more
      efficiently. Risk Modeler, UnderwriteIQ, TreatyIQ, and ExposureIQ tenants can use them to manage bulk data
      transfers, automate catastrophe modeling workflows, and generate reports.
  - aid: moodys:commercial-real-estate-api
    name: Moody's Commercial Real Estate API
    tags:
