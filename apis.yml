      - url: https://hub.moodysanalytics.com/products
        type: Documentation
    description: >-
      Moody's Analytics QUIQspread is an intelligent, financial spreading software that will accelerate a company's
      spreading process. The API enables integration of automated financial statement processing into banking workflows.
  - aid: moodys:capital-risk-analyzer-api
    name: Moody's Capital Risk Analyzer API
    tags:
      - Banking
      - Capital Planning
      - Risk
      - Stress Testing
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://hub.moodysanalytics.com
    contact:
      - FN: API Evangelist
