        type: Overlay
    description: >-
      Retrieves probability of default and loss rates for the municipal market under baseline and stress scenarios.
      Enables scoring of municipal credit risk using Moody's Analytics models.
  - aid: moodys:edf-x-api
    name: Moody's EDF-X API
    tags:
      - Credit Risk
      - Expected Default Frequency
      - Probability of Default
      - Risk Assessment
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://hub.moodysanalytics.com
    contact:
      - FN: API Evangelist
        email: kin@apievangelist.com
    humanURL: https://hub.moodysanalytics.com/products
    properties:
      - url: https://hub.moodysanalytics.com/products
        type: Documentation
    description: >-
      The EDF-X API provides easy access to probability of default calculations for approximately 400 million companies
      globally via the Orbis database. It provides a PD term structure with annualized, cumulative, and forward PD
      values, implied ratings, and confidence indicators.
  - aid: moodys:newsedge-api
    name: Moody's NewsEdge API
    tags:
      - Media
      - News
      - Real-Time Data
      - Social Media
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://hub.moodysanalytics.com
    contact:
      - FN: API Evangelist
        email: kin@apievangelist.com
    humanURL: https://hub.moodysanalytics.com/products
    properties:
