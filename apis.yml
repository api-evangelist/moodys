    humanURL: https://hub.moodysanalytics.com/products
    properties:
      - url: https://hub.moodysanalytics.com/products
        type: Documentation
    description: >-
      Moody's Analytics Capital Risk Analyzer solution is a tool that projects key capital ratios and credit metrics
      based on various strategic and economic scenarios for capital planning and stress testing such as DFAST and EBA.
