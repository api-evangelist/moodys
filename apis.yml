        type: OpenAPI
      - url: overlays/moodys-autocycle-api-overlay.yaml
        type: Overlay
    description: >-
      Retrieves forecasts of vehicle prices from AutoCycle models. AutoCycle is a software solution to forecast car
      prices, incorporating economic data and scenarios from Moody's Analytics.
  - aid: moodys:eccl-api
    name: Moody's Consumer Credit Loss Forecasts API
    tags:
      - Consumer Credit
      - Credit Loss
      - Forecasts
      - Risk
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://api.economy.com
    contact:
      - FN: API Evangelist
        email: kin@apievangelist.com
    humanURL: https://hub.moodysanalytics.com/products
    properties:
      - url: https://api.economy.com/eccl/v1/swagger
        type: Documentation
    description: >-
      Retrieves expected consumer credit loss forecasts under baseline and stress scenarios. The ECCL API combines
      customer data, economic data from Moody's Analytics, and consumer credit data for credit risk modeling.
  - aid: moodys:municipal-api
    name: Moody's Municipal Probability of Default API
    tags:
      - Credit Risk
      - Forecasts
      - Municipal
      - Probability of Default
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://api.economy.com
    contact:
      - FN: API Evangelist
        email: kin@apievangelist.com
    humanURL: https://hub.moodysanalytics.com/products
    properties:
