  - aid: moodys:scenario-studio-api
    name: Moody's Scenario Studio API
    tags:
      - Economic Models
      - Forecasting
      - Macroeconomic
      - Scenarios
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://api.economy.com
