      Location Intelligence API delivers more than 100 data layers across multiple kinds of data including hazard,
      location, risk score, model, and exposure data to help improve business decisions and better manage risk.
  - aid: moodys:risk-modeler-api
    name: Moody's Risk Modeler API
    tags:
      - Catastrophe Modeling
      - Insurance
      - Risk
      - Underwriting
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://developer.rms.com
    contact:
