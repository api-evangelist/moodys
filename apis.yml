      The Climate On Demand API enables financial services organizations to build physical climate risk applications
      that leverage the power of the Intelligent Risk Platform.
  - aid: moodys:location-intelligence-api
    name: Moody's Location Intelligence API
    tags:
      - Geospatial
      - Insurance
      - Location
      - Risk Data
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://developer.rms.com
    contact:
