naftiko: 1.0.0-alpha2
info:
  label: Moody's Data Buffet API — Series
  description: 'Moody''s Data Buffet API — Series. 2 operations. Lead operation: Moody''s Retrieve Multiple Time Series. Self-contained
    Naftiko capability covering one Moodys business surface.'
  tags:
  - Moodys
  - Series
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MOODYS_API_KEY: MOODYS_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-buffet-series
    baseUri: https://api.economy.com/data/v1
    description: Moody's Data Buffet API — Series business capability. Self-contained, no shared references.
    resources:
    - name: multi-series
      path: /multi-series
      operations:
      - name: getmultiseries
        method: POST
        description: Moody's Retrieve Multiple Time Series
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: series
      path: /series
      operations:
      - name: getseries
        method: GET
        description: Moody's Retrieve a Single Time Series
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MOODYS_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-buffet-series-rest
    port: 8080
    description: REST adapter for Moody's Data Buffet API — Series. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/multi-series
      name: multi-series
      description: REST surface for multi-series.
      operations:
      - method: POST
        name: getmultiseries
        description: Moody's Retrieve Multiple Time Series
        call: data-buffet-series.getmultiseries
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/series
      name: series
      description: REST surface for series.
      operations:
      - method: GET
        name: getseries
        description: Moody's Retrieve a Single Time Series
        call: data-buffet-series.getseries
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-buffet-series-mcp
    port: 9090
    transport: http
    description: MCP adapter for Moody's Data Buffet API — Series. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: moody-s-retrieve-multiple-time-series
      description: Moody's Retrieve Multiple Time Series
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: data-buffet-series.getmultiseries
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: moody-s-retrieve-single-time-series
      description: Moody's Retrieve a Single Time Series
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-buffet-series.getseries
      outputParameters:
      - type: object
        mapping: $.
